version: '3.8'

services:
  # Production Next.js app
  remmic-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: remmic-app-prod
    environment:
      - NODE_ENV=production
      - PORT=3008
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    networks:
      - remmic-prod-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3008/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: remmic-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - /var/log/nginx:/var/log/nginx
    depends_on:
      remmic-app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - remmic-prod-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # Watchtower for automatic updates (optional)
  watchtower:
    image: containrrr/watchtower
    container_name: remmic-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
    restart: unless-stopped
    profiles:
      - auto-update

networks:
  remmic-prod-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16