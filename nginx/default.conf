# Upstream definition for the Next.js app
upstream remmic_app {
    server remmic-app:3008;
    keepalive 32;
}

# HTTP server (redirects to HTTPS in production)
server {
    listen 80;
    server_name localhost;
    
    # For Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS in production
    # Comment out the next 3 lines for development
    # location / {
    #     return 301 https://$server_name$request_uri;
    # }
    
    # For development, proxy directly to app
    location / {
        proxy_pass http://remmic_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}

