server {
    listen 80;
    server_name localhost;
    root /var/www/assets;
    index index.html;

    # Security
    server_tokens off;
    
    # CORS headers for assets
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "Assets server healthy\n";
        add_header Content-Type text/plain;
    }

    # Logo endpoints
    location /logos/ {
        alias /var/www/assets/logos/;
        
        # Try optimized version first, then original
        try_files $uri /optimized$uri $uri =404;
        
        # Cache headers for logos
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        
        # Enable CORS
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Max-Age 86400;
            return 204;
        }
    }

    # Main logo endpoint (serves REMMIC logo in multiple formats)
    location = /logo {
        alias /var/www/assets/logos/;
        
        # Content negotiation based on Accept header
        set $logo_file "REMMIC LOGO SVG.svg";
        
        if ($http_accept ~* "image/webp") {
            set $logo_file "remmic-logo.webp";
        }
        if ($http_accept ~* "image/avif") {
            set $logo_file "remmic-logo.avif";
        }
        
        try_files /optimized/$logo_file /$logo_file /REMMIC\ LOGO\ SVG.svg =404;
        
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept";
    }

    # Logo variants
    location = /logo.svg {
        alias /var/www/assets/logos/REMMIC LOGO SVG.svg;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Content-Type "image/svg+xml";
    }

    location = /logo.png {
        alias /var/www/assets/logos/optimized/remmic-logo.png;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /logo.webp {
        alias /var/www/assets/logos/optimized/remmic-logo.webp;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /logo-small.svg {
        alias /var/www/assets/logos/optimized/remmic-logo-small.svg;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /logo-favicon.ico {
        alias /var/www/assets/logos/optimized/favicon.ico;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Images directory
    location /images/ {
        alias /var/www/assets/images/;
        try_files $uri /optimized$uri $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Media directory
    location /media/ {
        alias /var/www/assets/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Optimized assets
    location /optimized/ {
        alias /var/www/assets/optimized/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Asset API endpoints
    location /api/ {
        return 404;
    }

    # Asset management API (simple file listing)
    location = /api/assets {
        default_type application/json;
        content_by_lua_block {
            local cjson = require "cjson"
            local assets = {
                logos = {
                    {name = "main", url = "/logo.svg", format = "svg"},
                    {name = "main", url = "/logo.png", format = "png"},
                    {name = "main", url = "/logo.webp", format = "webp"},
                    {name = "small", url = "/logo-small.svg", format = "svg"},
                    {name = "favicon", url = "/logo-favicon.ico", format = "ico"}
                }
            }
            ngx.say(cjson.encode(assets))
        }
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ \.(bak|backup|old|tmp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
        return 404 "Asset not found\n";
        add_header Content-Type text/plain;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        return 500 "Assets server error\n";
        add_header Content-Type text/plain;
    }
}